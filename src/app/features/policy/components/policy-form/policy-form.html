<form [formGroup]="form" (ngSubmit)="submit()">
    <h3>Create Policy</h3>
  
    <input type="text" placeholder="Policy Number" formControlName="policyNumber" />
  
    <input
      type="text"
      placeholder="Search customer by name/email"
      (input)="onSearch($any($event.target).value)"
    />
  
    <select formControlName="customerId">
      <option [ngValue]="0">Select customer</option>
      <option *ngFor="let c of filteredCustomers()" [ngValue]="c.id">
        {{ c.firstName }} {{ c.lastName }} ({{ c.email }})
      </option>
    </select>
  
    <select formControlName="policyType">
      <option *ngFor="let t of policyTypes" [ngValue]="t">{{ t }}</option>
    </select>
  
    <input type="number" placeholder="Premium Amount" formControlName="premiumAmount" />
    <input type="date" formControlName="startDate" />
    <input type="date" formControlName="endDate" />
  
    <button type="submit">Create Policy</button>
  </form>
